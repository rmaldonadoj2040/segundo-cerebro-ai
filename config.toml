# Segundo Cerebro AI configuration (Spanish Edition MVP)
# Configuración de Segundo Cerebro AI - Edición en Español MVP
# All paths are relative to the project root unless they start with /

[language]
default_output_language = "spanish"
translate_english_inputs = true
preserve_key_terms = true

[paths]
inbox = "data/inbox"
raw = "data/raw"
wiki = "data/wiki"
conceptos_dir = "data/wiki/conceptos"
tensiones_dir = "data/wiki/tensiones"
insights_dir = "data/wiki/insights"
preguntas_dir = "data/wiki/preguntas"
outputs = "outputs"
archive_originals = "data/archivo/originales"
archive_normalized = "data/archivo/normalizado"

[obsidian]
use_wikilinks = true
create_dashboard = true
spanish_titles = true

[product]
name = "Segundo Cerebro AI"
positioning = "Un segundo cerebro que conecta automáticamente todo lo que aprendes."

[llm]
api_key   = ""            # leave blank to use env var
model     = "gpt-4o-mini"
base_url  = ""            # leave blank for OpenAI default
timeout   = 30
max_retries = 2

[wiki]
max_context_chars = 4000
required_sections = [
    "## Qué significa",
    "## Por qué importa",
    "## Conexiones",
    "## Insight clave",
    "## Pregunta abierta",
    "## Fuentes",
]
min_page_words = 30

[generation]
language = "Spanish"
audience = "spanish"
status = "active"

[topics]
seed_labels = [
    "Artificial Intelligence",
    "Machine Learning",
    "Productivity",
    "Knowledge Management",
    "Software Engineering",
    "Data Science",
]
max_label_words = 3
