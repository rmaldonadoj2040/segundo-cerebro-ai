# llm-knowledge-studio configuration (Spanish Edition MVP)
# Configuración de llm-knowledge-studio - Edición en Español MVP
# All paths are relative to the project root unless they start with /

[language]
default_output_language = "spanish"
translate_english_inputs = true
preserve_key_terms = true

[paths]
captures = "data/capturas"
knowledge_map = "vault"
outputs = "outputs"
archive_originals = "data/archivo/originales"
archive_normalized = "data/archivo/normalizado"

[obsidian]
use_wikilinks = true
create_dashboard = true
spanish_titles = true

[product]
name = "Mapa Mental IA"
positioning = "Un segundo cerebro que conecta automáticamente todo lo que aprendes."

[llm]
api_key   = ""            # leave blank to use env var
model     = "gpt-4o-mini"
base_url  = ""            # leave blank for OpenAI default
timeout   = 30
max_retries = 2

[wiki]
max_context_chars = 4000
required_sections = [
    "## Idea central",
    "## Por qué importa",
    "## Cómo funciona",
    "## Tensiones relacionadas",
    "## Conexiones con otros conceptos",
    "## Fuentes",
]
min_page_words = 30

[generation]
language = "Spanish"
audience = "spanish"
status = "active"

[topics]
seed_labels = [
    "Artificial Intelligence",
    "Machine Learning",
    "Productivity",
    "Knowledge Management",
    "Software Engineering",
    "Data Science",
]
max_label_words = 3
